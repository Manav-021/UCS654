<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Automation Pipeline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1a1a2e, #0f0f1b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .card {
            background: #141427;
            padding: 45px;
            border-radius: 18px;
            width: 420px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #c084fc;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: #aaa;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 22px;
            border-radius: 8px;
            border: 1px solid #2a2a40;
            background: #1e1e35;
            color: #fff;
            font-size: 14px;
            transition: 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.6);
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(90deg, #9333ea, #ec4899);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.5);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #777;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
            color: #ec4899;
        }
    </style>

    <script>
        function showLoader() {
            document.getElementById("loader").style.display = "block";
        }
    </script>

</head>
<body>

<div class="card">
    <h2>Image Automation Pipeline</h2>

    <form method="POST" onsubmit="showLoader()">
        <label>Search Keyword</label>
        <input type="text" name="keyword" placeholder="e.g. mountains" required>

        <label>Number of Images</label>
        <input type="number" name="num_images" min="1" max="50" placeholder="e.g. 10" required>

        <label>Receiver Email</label>
        <input type="email" name="email" placeholder="example@email.com" required>

        <button type="submit">Start Processing</button>
    </form>

    <div id="loader" class="loader">
        Processing... Please wait
    </div>

    <div class="footer">
        Flask Powered Automation System
    </div>
</div>

</body>
</html>
